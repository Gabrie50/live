<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bac Bo 🔴 LIVE HD</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:Arial,sans-serif;}
        .player-container{width:100%;max-width:1200px;margin:0 auto;position:relative;}
        .video-wrapper{position:relative;width:100%;aspect-ratio:16/9;background:#111;border-radius:12px;overflow:hidden;}
        .live-badge{position:absolute;top:15px;left:15px;background:#ff4444;color:#fff;padding:8px 16px;border-radius:25px;font-size:0.9rem;font-weight:bold;z-index:10;animation:pulse 1.5s infinite;}
        .player-count{position:absolute;top:15px;right:15px;background:rgba(0,0,0,0.8);color:#ffd700;padding:8px 16px;border-radius:25px;font-size:0.9rem;z-index:10;display:flex;align-items:center;gap:8px;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}
        video{width:100%;height:100%;object-fit:cover;}
        .controls{display:flex;gap:15px;margin-top:20px;justify-content:center;flex-wrap:wrap;}
        .btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);padding:12px 24px;border-radius:30px;color:#fff;cursor:pointer;transition:all 0.3s;font-size:1rem;font-weight:bold;}
        .btn:hover{background:#ff4444;border-color:#ff4444;transform:scale(1.05);}
        .status{text-align:center;margin-top:15px;color:#aaa;font-size:0.85rem;}
    </style>
</head>
<body>
    <div class="player-container">
        <div class="video-wrapper">
            <div class="live-badge">🔴 LIVE HD</div>
            <div class="player-count">
                <span>👥</span>
                <span id="playerCount">4,892</span>
            </div>
            <video id="video" controls autoplay muted playsinline></video>
        </div>
        <div class="controls">
            <button class="btn" id="reload">⟳ HD Reload</button>
            <button class="btn" id="fullscreen">⛶ Fullscreen</button>
        </div>
        <div class="status" id="status">Carregando stream oficial...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const streams = ['/stream.m3u8', 'https://d2ziijpvlodb0w.cloudfront.net/bac-bo.m3u8'];

        let hls, currentStream = 0;

        function loadStream(index = 0) {
            const url = streams[index];
            status.textContent = `🔄 Stream ${index + 1}/${streams.length}`;
            
            if (hls) hls.destroy();
            
            if (Hls.isSupported()) {
                hls = new Hls({
                    lowLatencyMode: true,
                    liveSyncDuration: 2,
                    maxBufferLength: 30,
                    xhrSetup: (xhr) => {
                        xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (iPhone; CPU iPhone OS 16_0)');
                        xhr.setRequestHeader('Referer', 'https://casino.org/');
                    }
                });
                hls.loadSource(url);
                hls.attachMedia(video);
            } else {
                video.src = url;
            }
        }

        video.addEventListener('canplay', () => {
            status.innerHTML = '✅ <span style="color:#4caf50">LIVE HD 24/7</span>';
            video.play();
            document.querySelector('.live-badge').textContent = '🔴 LIVE HD';
        });

        video.addEventListener('error', () => {
            currentStream++;
            if (currentStream < streams.length) {
                setTimeout(() => loadStream(currentStream), 1500);
            } else {
                currentStream = 0;
                setTimeout(() => loadStream(0), 5000);
            }
        });

        document.getElementById('reload').onclick = () => loadStream(0);
        document.getElementById('fullscreen').onclick = () => document.querySelector('.video-wrapper').requestFullscreen?.() || document.querySelector('.video-wrapper').webkitRequestFullscreen?.();

        // Auto-start
        loadStream();
        setInterval(() => {
            if (video.paused && video.readyState > 0) video.play();
        }, 5000);

        // Contador fake
        setInterval(() => {
            document.getElementById('playerCount').textContent = (3000 + Math.floor(Math.random() * 2000)).toLocaleString();
        }, 15000);
    </script>
</body>
</html>
